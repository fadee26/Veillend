name: Web CI

on:
  push:
    branches:
      - main
    paths:
      - "veilend-web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "veilend-web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: veilend-web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: veilend-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
